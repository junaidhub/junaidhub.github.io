<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JunaidHub — Files & Resources</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="JunaidHub — quick access to Junaid Sahibole's files, notes and resources." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-inner">
      <button id="sidebarToggle" class="icon-btn" aria-label="Toggle sidebar" title="Toggle sidebar">
        <i class="fas fa-bars"></i>
      </button>
      <a href="index.html" class="brand">
        <span class="brand-icon"><i class="fas fa-folder-open"></i></span>
        <span class="brand-text">JunaidHub</span>
      </a>

      <div class="search-wrap">
        <i class="fas fa-search search-icon"></i>
        <input id="globalSearch" type="text" placeholder="Search files & folders…  ( press / )" autocomplete="off" spellcheck="false" />
        <kbd class="search-kbd">/</kbd>
        <div id="searchResults" class="search-results hidden"></div>
      </div>

      <div class="topbar-actions">
        <button id="refreshBtn" class="icon-btn" aria-label="Refresh" title="Refresh">
          <i class="fas fa-rotate"></i>
        </button>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle theme" title="Toggle dark mode (Ctrl+D)">
          <i class="fas fa-moon"></i>
        </button>
        <a href="about.html" class="btn-link" title="About me">
          <i class="fas fa-user"></i><span class="hide-sm">About</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- Mobile backdrop -->
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <div class="layout">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-head">
          <span><i class="fas fa-folder"></i> Folders</span>
          <div class="sort-wrap" title="Sort folders">
            <select id="sortSelect" aria-label="Sort folders">
              <option value="recent">Recent first</option>
              <option value="name">Name (A–Z)</option>
              <option value="count">Most files</option>
            </select>
          </div>
        </div>
        <div id="folderList" class="folder-list">
          <!-- Skeleton placeholders -->
          <div class="skeleton skeleton-folder"></div>
          <div class="skeleton skeleton-folder"></div>
          <div class="skeleton skeleton-folder"></div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-head"><span><i class="fas fa-bell"></i> Notifications</span></div>
        <div id="notificationList" class="notification-list">
          <div class="skeleton skeleton-note"></div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="mainContent" class="main">
      <!-- Home view -->
      <section id="homeView" class="view">
        <div class="hero-card">
          <div class="hero-text">
            <h1>Welcome back<span class="dot">.</span></h1>
            <p>Quick access to your notes, datasheets, code snippets and resources.</p>
          </div>
          <div class="hero-stats">
            <div class="stat"><span id="statFolders">–</span><small>folders</small></div>
            <div class="stat"><span id="statFiles">–</span><small>files</small></div>
            <div class="stat"><span id="statRecent">–</span><small>updated this week</small></div>
          </div>
        </div>

        <div class="section-head">
          <h2><i class="fas fa-clock-rotate-left"></i> Recently updated</h2>
        </div>
        <div id="recentList" class="recent-grid"></div>

        <div class="section-head">
          <h2><i class="fas fa-folder-tree"></i> All folders</h2>
        </div>
        <div id="folderGrid" class="folder-grid"></div>
      </section>

      <!-- Folder view -->
      <section id="folderView" class="view hidden">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <button id="crumbHome" class="crumb-link"><i class="fas fa-home"></i> Home</button>
          <span class="crumb-sep">/</span>
          <span id="crumbFolder" class="crumb-current"></span>
        </nav>

        <div class="folder-toolbar">
          <h2 id="folderTitle"></h2>
          <input id="fileFilter" type="text" placeholder="Filter files in this folder…" />
        </div>

        <div id="tabHeader" class="tab-header" role="tablist"></div>
        <div id="tabContent" class="tab-content"></div>
      </section>
    </main>
  </div>

  <footer class="footer">
    <span>Maintained by <strong>Junaid Sahibole</strong></span>
    <span class="footer-dot">•</span>
    <span>Hosted on GitHub Pages</span>
    <span class="footer-dot">•</span>
    <span id="footerMeta"></span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
